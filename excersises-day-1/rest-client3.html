<!DOCTYPE html>
<html>
<head>
<title>chat</title>
</head>
<body>

<input id="messageInput" placeholder="post id">
<input id="word" placeholder="keyword">
<button id="blueButton" style="color: blue;">Display Comments</button>
<button id="greenButton" style="color: green;">Display Posts</button>

<ul id="messages"></ul>


<script src="Rest-client-server-practice.js"></script>
<script>

// write comments of individual steps first!

//1. link the buttons from the html page to the script 
const blueButton = document.getElementById("blueButton");
const greenButton = document.getElementById("greenButton");
const inputField = document.getElementById("messageInput");
const messages = document.getElementById("messages");
const searchTerm = document.getElementById("word");


blueButton.addEventListener("click", function() {
    const postId = inputField.value;
    const keyword = searchTerm.value;
    client
    .get("/comments")
    .then(comments => {
        const filteredCom = comments.filter(comment => {
            return comment.id == postId && comment.text.includes(keyword)
        })
        filteredCom.forEach(comment => {
            const li = document.createElement("li");
            li.textContent = comment.text;
            messages.appendChild(li)
        })
    })
})

greenButton.addEventListener("click", function() {
    client
    .get("/posts")
    .then(posts => {
        const filtered = posts.filter(post => {
                return post.views > 60
            })
            filtered.forEach((post) => {

            const li = document.createElement("li")
            li.textContent = post.title
            messages.appendChild(li)
        })
    })
})






</script>

</body>
</html>
